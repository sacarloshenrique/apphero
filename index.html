<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RotinaHero - Vença a Procrastinação</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white;
            text-align: center;
            padding: 50px 20px;
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .container {
            max-width: 600px;
            background: rgba(255, 255, 255, 0.1);
            padding: 40px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        h1 { font-size: 2.5rem; margin-bottom: 10px; }
        p { font-size: 1.2rem; line-height: 1.6; color: #e0e0e0; }
        .btn {
            display: inline-block;
            background-color: #ff9900;
            color: #000;
            font-weight: bold;
            padding: 15px 30px;
            margin-top: 20px;
            text-decoration: none;
            border-radius: 50px;
            font-size: 1.1rem;
            transition: transform 0.2s;
        }
        .btn:hover { transform: scale(1.05); background-color: #ffad33; }
        .footer { margin-top: 40px; font-size: 0.8rem; opacity: 0.6; }
    </style>
</head>
<body>

    <div class="container">
        <h1>🦸‍♂️ RotinaHero</h1>
        <p>O aplicativo que usa Inteligência Artificial para organizar seu dia e transformar tarefas em conquistas.</p>
        
        <p><em>Ideal para quem precisa de foco e estrutura.</em></p>

        <a href="https://play.google.com/store/apps/details?id=com.sa.carlos.rotinaai" class="btn">
            📲 Baixar Agora no Android
        </a>
    </div>

    <div class="footer">
        &copy; 2026 AppHero. Todos os direitos reservados.
    </div>

</body>
</html>
